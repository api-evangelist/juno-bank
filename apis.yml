aid: juno-bank
name: Juno
description: >-
  Juno is a Brazilian B2B payments fintech, acquired by EBANX in October 2021,
  that provides a complete billing and payments platform for Brazilian
  companies. Founded in 2014 in Maringá, Paraná, Juno powers more than 35,000
  small and medium businesses with online sales and collections via Pix, boleto
  bancário, boleto_pix, and credit cards, plus marketplace payment split,
  recurring subscriptions, and a digital business account (Conta Juno) with
  Banking-as-a-Service capabilities. Juno is a participant of the Brazilian
  Interbank Payments Chamber (CIP). The company exposes a public REST API v2
  through the Juno Developer Academy at integracao.juno.com.br, secured with
  OAuth 2.0 client_credentials, plus HMAC-SHA256 signed webhooks and native
  mobile Direct Checkout SDKs for Android and iOS for PCI-safe card data
  encryption.
